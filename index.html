<!DOCTYPE html>

<html lang="en">

<head>

<body class="min-h-screen bg-slate-950 text-slate-100 flex flex-col">

  <!-- HEADER -->

  <header class="border-b border-cyan-500/30 bg-slate-950/90 backdrop-blur-xl sticky top-0 z-20">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="h-10 w-10 rounded-xl bg-gradient-to-tr from-cyan-500 to-fuchsia-500 flex items-center justify-center neon-border">
          <i class="fa-solid fa-shield-halved text-xl text-slate-950"></i>
        </div>
        <div>
          <h1 class="text-xl md:text-2xl font-extrabold tracking-widest uppercase">
            <span class="bg-gradient-to-r from-cyan-400 via-sky-400 to-fuchsia-400 bg-clip-text text-transparent">
              <i class="fa-solid fa-shield mr-2"></i>CyberGuard
            </span>
          </h1>
          <p class="text-xs text-slate-400 uppercase tracking-[0.2em]">
            <i class="fa-solid fa-bolt mr-1"></i>Hyper-Interactive Password Sentinel
          </p>
        </div>
      </div>

```
  <!-- NAV -->
  <nav class="flex gap-6 text-sm font-medium">
    <button data-view="home" class="nav-link text-cyan-400 nav-active">
      <i class="fa-solid fa-home mr-1"></i>Home
    </button>
    <button data-view="reviews" class="nav-link text-slate-300 hover:text-cyan-400">
      <i class="fa-solid fa-comments mr-1"></i>Reviews
    </button>
    <button data-view="about" class="nav-link text-slate-300 hover:text-cyan-400">
      <i class="fa-solid fa-bullseye mr-1"></i>About
    </button>
    <button data-view="faq" class="nav-link text-slate-300 hover:text-cyan-400">
      <i class="fa-solid fa-circle-question mr-1"></i>FAQ
    </button>
  </nav>
</div>
```

  </header>

  <!-- MAIN -->

  <main class="flex-1">
    <div class="max-w-6xl mx-auto px-4 py-8 space-y-8">

```
  <!-- HOME -->
  <section id="view-home" class="view-section">
    <!-- (rest of your original content stays unchanged) -->
    <h2 class="text-lg font-semibold">Your original content here (unchanged)</h2>
  </section>

  <!-- REVIEWS -->
  <section id="view-reviews" class="view-section hidden">
    <textarea id="reviewInput"></textarea>
    <button id="submitReview">Submit Review</button>
    <ul id="reviewList"></ul>
  </section>

  <!-- ABOUT -->
  <section id="view-about" class="view-section hidden">
    <p>About CyberGuard...</p>
  </section>

  <!-- FAQ -->
  <section id="view-faq" class="view-section hidden">
    <input id="faqInput">
    <button id="submitFaq">Submit Question</button>
    <div id="faqList"></div>
  </section>

</div>
```

  </main>

  <!-- FOOTER -->

  <footer class="text-center py-4">
    <p class="text-xs text-slate-500">© 2025 CyberGuard</p>
  </footer>

  <!-- ✅ Correct JS -->

  <script src="script.js" defer></script>

</body>
</html>
